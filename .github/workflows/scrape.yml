name: Scrape NYUrban

on:
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send a test email and skip scraping (true/false)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scraper.js
        env:
          RESEND_KEY:          ${{ secrets.RESEND_KEY }}
          ALERT_EMAIL:         ${{ secrets.ALERT_EMAIL }}
          TEST_EMAIL:          ${{ github.event.inputs.test_email }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

